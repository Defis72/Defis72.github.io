<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юрий Мудрогелов | Визитка</title>
    <style>
        /* Стили прямо внутри файла, чтобы ничего лишнего не подключать */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

            .card:hover {
                transform: translateY(-10px);
            }

        /* Заглушка для фото. Вы можете заменить на свою фотографию */
        .photo {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .badge {
            background: #f0f0f0;
            color: #667eea;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .description {
            color: #666;
            line-height: 1.7;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .contacts {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #555;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
            padding: 10px;
            border-radius: 10px;
            background: #f8f9fa;
        }

            .contact-item:hover {
                background: #667eea;
                color: white;
            }

                .contact-item:hover svg {
                    fill: white;
                }

            .contact-item svg {
                width: 20px;
                height: 20px;
                fill: #667eea;
                transition: fill 0.3s;
            }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .social-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: opacity 0.3s;
        }

            .social-link:hover {
                opacity: 0.8;
                text-decoration: underline;
            }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 28px;
            }

            .photo {
                width: 120px;
                height: 120px;
                font-size: 40px;
            }
        }
    </style>
</head>
